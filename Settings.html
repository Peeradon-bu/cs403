<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ตั้งค่าระบบ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap');
        body { font-family: 'Sarabun', sans-serif; background-color: #e5e7eb; }
        .bg-primary { background-color: #26b899; }
        .text-primary { color: #26b899; }
        .app-container { max-width: 480px; margin: 0 auto; background-color: #f3f4f6; min-height: 100vh; position: relative; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); overflow-x: hidden; }
    </style>
</head>
<body>

<div class="app-container pb-24">
    <header class="bg-primary text-white p-6 shadow-md rounded-b-[2rem]">
        <h1 class="text-xl font-bold">ตั้งค่าระบบ</h1>
        <p class="text-[10px] text-white/70">จัดการข้อมูลและระบบสำรองข้อมูล</p>
    </header>

    <main class="p-4 space-y-4 -mt-4">
        <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-50 flex items-center justify-between cursor-pointer hover:bg-gray-50 transition" onclick="exportCSV()">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 bg-blue-100 text-blue-500 rounded-full flex items-center justify-center text-lg">
                    <i class="fas fa-file-excel"></i>
                </div>
                <div>
                    <h3 class="font-bold text-gray-800 text-sm">ส่งออกข้อมูล (Export CSV)</h3>
                    <p class="text-[10px] text-gray-400">ดาวน์โหลดข้อมูลสต็อกไปเปิดใน Excel</p>
                </div>
            </div>
            <i class="fas fa-chevron-right text-gray-300"></i>
        </div>

        <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-50 flex items-center justify-between cursor-pointer hover:bg-red-50 transition" onclick="resetData()">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 bg-red-100 text-red-500 rounded-full flex items-center justify-center text-lg">
                    <i class="fas fa-trash-alt"></i>
                </div>
                <div>
                    <h3 class="font-bold text-red-600 text-sm">ล้างข้อมูลทั้งหมด</h3>
                    <p class="text-[10px] text-gray-400">รีเซ็ตรายการสินค้าและประวัติทั้งหมด</p>
                </div>
            </div>
            <i class="fas fa-chevron-right text-gray-300"></i>
        </div>
    </main>

    <nav class="absolute bottom-0 w-full bg-white border-t flex justify-around p-3 text-[10px] text-gray-400 z-20 rounded-b-xl shadow-[0_-10px_20px_-10px_rgba(0,0,0,0.1)]">
        <a href="Dashboard.html" class="flex flex-col items-center w-1/3 hover:text-primary">
            <i class="fas fa-chart-pie text-lg mb-1"></i>ภาพรวม
        </a>
        <a href="index.html" class="flex flex-col items-center w-1/3 hover:text-primary">
            <i class="fas fa-box text-lg mb-1"></i>รายการสินค้า
        </a>
        <div class="flex flex-col items-center w-1/3 text-primary">
            <i class="fas fa-cog text-lg mb-1"></i>ตั้งค่า
        </div>
    </nav>
</div>

<script src="app.js"></script>
</body>
</html>
